<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAML Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f8f9fa;
        }
        
        .navbar {
            flex-shrink: 0;
        }
        
        .container-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 20px;
        }
        
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        textarea {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            flex: 1;
        }
        
        .status-bar {
            margin-top: 15px;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 4px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">YAML Editor</span>
        </div>
    </nav>

    <div class="container-main">
        <div class="toolbar">
            <button class="btn btn-primary btn-sm" id="newBtn">New</button>
            <button class="btn btn-success btn-sm" id="saveBtn">Save</button>
            <button class="btn btn-secondary btn-sm" id="loadBtn">Load</button>
            <span id="filename" class="ms-auto align-self-center text-muted"></span>
        </div>

        <textarea id="editor" class="form-control" spellcheck="false"></textarea>

        <div class="status-bar">
            <span id="status">Ready</span>
        </div>
    </div>

    <!-- Load File Modal -->
    <div class="modal fade" id="loadModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Load YAML File</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="fileList" class="list-group">
                        <div class="spinner-border spinner-border-sm" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
