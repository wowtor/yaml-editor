<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAML Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f8f9fa;
        }
        
        .navbar {
            flex-shrink: 0;
        }
        
        .container-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 20px;
        }
        
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        textarea {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            flex: 1;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        
        .status-bar {
            margin-top: 15px;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 4px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">YAML Editor</span>
        </div>
    </nav>

    <div class="container-main">
        <div class="toolbar">
            <button class="btn btn-primary btn-sm" id="newBtn">New</button>
            <button class="btn btn-success btn-sm" id="saveBtn">Save</button>
            <button class="btn btn-info btn-sm" id="downloadBtn">Download</button>
            <div class="file-input-wrapper">
                <button class="btn btn-secondary btn-sm">Load</button>
                <input type="file" id="loadBtn" accept=".yaml,.yml" />
            </div>
            <span id="filename" class="ms-auto align-self-center text-muted"></span>
        </div>

        <textarea id="editor" class="form-control" spellcheck="false"></textarea>

        <div class="status-bar">
            <span id="status">Ready</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
